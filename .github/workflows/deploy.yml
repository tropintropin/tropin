name: Deploy site V2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      THUNDERFOREST_KEY: ${{ secrets.THUNDERFOREST_KEY }}
      WEBMENTION_DOMAIN: ${{ secrets.WEBMENTION_DOMAIN }}
      WEBMENTION_TOKEN: ${{ secrets.WEBMENTION_TOKEN }}
      WEBMENTION_APP_TOKEN: ${{ secrets.WEBMENTION_APP_TOKEN }}
      TZ: 'Europe/Moscow'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy site
        run: npm run build

      - name: Send Webmentions
        run: npm run send-webmentions

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
